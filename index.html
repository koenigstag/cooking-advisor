<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/index.css" />

    <script type="module" src="./libs/react/setup.js"></script>

    <script type="importmap">
      {
        "imports": {
          "ts-browser": "https://koenigstag.github.io/ts-browser/src/ts-browser.js",
          "react": "./libs/react/react.js",
          "react-dom/client": "./libs/react/react-dom.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="app" class="app"></div>

    <script type="module">
      // load entry .tsx script
      import { loadModule } from 'ts-browser';
      const entryScriptPath = './script/index.tsx';
      loadModule(entryScriptPath, { jsx: 2 }).then((indexModule) => {
        return indexModule.default(document.getElementById('app'));
      });
    </script>
  </body>
</html>
